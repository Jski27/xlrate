<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xlrate — Daily Planner</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1><span class="logo-accent">xl</span>rate</h1>
    <p>Execution OS — Daily Planner</p>
  </header>

  <main>

    <!-- CONFIG -->
    <section class="card">
      <h2>Configuration</h2>
      <div class="config-grid">
        <label>
          Date
          <input type="date" id="plan-date">
        </label>
        <label>
          Work Start
          <input type="time" id="work-start" value="08:00">
        </label>
        <label>
          Work End
          <input type="time" id="work-end" value="22:00">
        </label>
        <label>
          Buffer %
          <input type="number" id="buffer-pct" value="20" min="0" max="100">
        </label>
      </div>
    </section>

    <!-- INPUT COLUMNS -->
    <div class="input-columns">

      <!-- BLOCKS -->
      <section class="card">
        <h2>Non-Negotiable Blocks</h2>
        <div class="add-form">
          <input type="text"   id="block-name"      placeholder="Name (e.g. Math Class)">
          <input type="time"   id="block-start"     value="09:00">
          <input type="time"   id="block-end"       value="10:30">
          <select              id="block-recurring">
            <option value="none">Once</option>
            <option value="daily">Daily</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
            <option value="mwf">MWF</option>
            <option value="tth">TTh</option>
            <option value="weekly">Weekly</option>
          </select>
          <button id="add-block-btn">+ Add Block</button>
        </div>
        <ul id="blocks-list"></ul>
      </section>

      <!-- TASKS -->
      <section class="card">
        <h2>Tasks</h2>
        <div class="add-form tasks-form">
          <div class="task-row-primary">
            <input type="text" id="task-name"     placeholder="Task name">
            <input type="text" id="task-duration" placeholder="e.g. 30m, 1h, 1.5h">
            <button id="add-task-btn">+ Add</button>
          </div>
          <div class="task-row-details">
            <label>Priority
              <select id="task-priority">
                <option value="5">P5 — Critical</option>
                <option value="4">P4 — High</option>
                <option value="3" selected>P3 — Medium</option>
                <option value="2">P2 — Low</option>
                <option value="1">P1 — Optional</option>
              </select>
            </label>
            <label>Deadline
              <input type="date" id="task-deadline">
            </label>
            <label>Energy
              <select id="task-energy">
                <option value="">—</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </label>
          </div>
        </div>
        <ul id="tasks-list"></ul>
      </section>

    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="btn-secondary" id="demo-btn">Load Demo Data</button>
      <button class="btn-primary"   id="generate-btn">Generate Schedule</button>
    </div>

    <!-- OUTPUT -->
    <section id="output" class="hidden">
      <div class="cal-layout">

        <div class="card cal-card">
          <div class="cal-header">
            <h2>Daily Calendar</h2>
            <div class="cal-legend">
              <span class="legend-dot legend-dot--block"></span><span class="legend-label">Non-negotiable</span>
              <span class="legend-dot legend-dot--task"></span><span class="legend-label">Scheduled task</span>
            </div>
          </div>
          <div id="out-calendar"></div>
        </div>

        <div class="card">
          <h2>Spillover</h2>
          <div id="out-spillover"></div>
        </div>

      </div>
      <div class="meta-bar" id="out-meta"></div>
    </section>

  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
